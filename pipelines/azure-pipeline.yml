trigger:
- main

pool:
  vmImage: "ubuntu-latest"

resources:
  repositories:
    - repository: policy-repo
      type: github
      name: chloe-teo/policy-repo
      endpoint: chloe-teo

steps:
  - checkout: self
  - checkout: policy-repo

  - script: |
      ls -al $(Build.SourcesDirectory)
    displayName: 'List files in the source directory'

  - task: KubeDockSecurityScan@0
    displayName: 'Run KubeDock Security Scan'
    inputs:
      repoPath: '$(Build.SourcesDirectory)/sample-manifests'
      policyRepoPath: '$(Build.SourcesDirectory)/policy-repo'
      helmFolderPath: '$(Build.SourcesDirectory)/sample-manifests/helm/myapp'
      helmValuesFile: "$(Build.SourcesDirectory)/sample-manifests/helm/myapp/values.yaml,$(Build.SourcesDirectory)/helm/myapp/values-dev.yaml"
      helmTemplatesPath: '$(Build.SourcesDirectory)/sample-manifests/templates'
